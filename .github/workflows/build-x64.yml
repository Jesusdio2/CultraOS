name: Build CultraOS (Debian Based)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools libarchive-tools

    - name: Create Debian Base (The "Heart")
      run: |
        sudo debootstrap --variant=minbase --include=linux-image-amd64,systemd-sysv,kmod,busybox,libpng16-16 \
          stable chroot_dir http://debian.org
        # Aquí instalamos el corazón de Debian. El kernel oficial de Debian NO da Kernel Panic.

    - name: Inject Your UI & Config
      run: |
        # Compila tu UI (puedes usar un contenedor o instalar librerías antes)
        sudo apt-get install -y libpng-dev zlib1g-dev gcc
        gcc -O2 src/main.c src/RoundRectDrawable.c -o build/ui -lpng -lz
        
        # Copia tu binario al sistema Debian
        sudo cp build/ui chroot_dir/usr/bin/cultra-ui
        
        # Configura que tu UI arranque al iniciar (estilo Systemd)
        sudo mkdir -p chroot_dir/etc/systemd/system/getty@tty1.service.d/
        echo -e "[Service]\nExecStart=\nExecStart=-/usr/bin/cultra-ui\nStandardInput=tty\nStandardOutput=tty" | sudo tee chroot_dir/etc/systemd/system/getty@tty1.service.d/override.conf

    - name: Create Compressed Filesystem (SquashFS)
      run: |
        mkdir -p image/live
        sudo mksquashfs chroot_dir image/live/filesystem.squashfs -comp xz

    - name: Prepare Bootloader (GRUB)
      run: |
        mkdir -p image/boot/grub
        # Copiamos el kernel y el initrd que generó Debian automáticamente
        sudo cp chroot_dir/boot/vmlinuz-* image/boot/vmlinuz
        sudo cp chroot_dir/boot/initrd.img-* image/boot/initrd
        
        echo 'menuentry "CultraOS Debian-Base" {
            linux /boot/vmlinuz boot=live quiet splash
            initrd /boot/initrd
        }' > image/boot/grub/grub.cfg

    - name: Create ISO
      run: |
        grub-mkrescue -o CultraOS-Debian.iso image

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: CultraOS-ISO
        path: CultraOS-Debian.iso
